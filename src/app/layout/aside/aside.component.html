<div class="aside">

  <!-- Выбор типа тура -->
   <label class="custom-label"><b>Выберите тип тура</b></label>
  <div class="field-wrapper">
    <mat-form-field appearance="outline">
      <mat-select [(value)]="selectedType" (selectionChange)="chamgeTourType($event)">
        @for (item of tourTypes; track item.key) {
          <mat-option [value]="item.key">{{ item.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <!-- Календарь -->
  <div class="field-wrapper">
    <mat-form-field appearance="outline">
      <input
        matInput
        [(ngModel)]="selectedDate"
        [matDatepicker]="dateSelection"
        (dateChange)="changeDate($event)"
        placeholder="Выберите дату тура"
      >
    </mat-form-field>

    <div class="actions-container">
      <!-- Кнопка сброса даты -->
      <button *ngIf="selectedDate" class="clear-btn" (click)="clearDate()">
        <mat-icon>close</mat-icon>
      </button>
      
      <!-- Контейнер иконки через разделитель -->
      <div class="icon-container" (click)="dateSelection.open()">
        <mat-datepicker-toggle [for]="dateSelection"></mat-datepicker-toggle>
      </div>
    </div>
    
    <mat-datepicker #dateSelection></mat-datepicker>
  </div>

</div>
