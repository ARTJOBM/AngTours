<div class="input-search-masonry">
  <mat-form-field>
    <input #inputSearch matInput placeholder="Поиск..." >
  </mat-form-field>
</div>

<div *ngIf="noResults" class="no-results">
  Не найдено данных
</div>

<div class="masonry-container" *ngIf="tours?.length">

  <div
    class="masonry"
    appHighlightActive
    #hightLightDirective
    [sort]="sort"
    [initFirst]="true"
    [selector]="'.tour-item'"
    (onEnter)="goToTour(tours[$event.index])"
  >

    <ngx-masonry>
      @for (item of tours; track item.id; let i = $index) {

        <div ngxMasonryItem class="masonry-item" [attr.index]="i">

          <mat-card class="tour-item" appearance="outlined">

            <img mat-card-image src="/img/{{ item.img }}">

            <mat-card-content class="card-content">

              <mat-card-title>{{ item.name }}</mat-card-title>
              <mat-card-subtitle>{{ item.tourOperator }}</mat-card-subtitle>

              <p>{{ item.date | date: 'dd.MM.YYYY' }}</p>

              <p [class.collapsed]="!item.expanded">
                {{ item.description }}
              </p>

              <button
                mat-button
                class="toggle-btn"
                (click)="item.expanded = !item.expanded"
              >
                {{ item.expanded ? 'Скрыть' : 'Показать больше' }}
              </button>

              <div class="footer">
                <span class="price">{{ item.price }}</span>

                <button
                  mat-button
                  class="details-btn"
                  (click)="goToTour(item)"
                >
                  Подробно
                </button>
              </div>

            </mat-card-content>
          </mat-card>

        </div>

      }
    </ngx-masonry>

  </div>
</div>
