<div class="d-flex flex-wrap">

  @for (item of tours; track $index) {
    <mat-card class="tour-item">

      <mat-card-header>
        <mat-card-title>{{ item.type }}</mat-card-title>
        <mat-card-subtitle>{{ item.date }}</mat-card-subtitle>
      </mat-card-header>

      <img mat-card-image src="/img/{{ item.img }}" />

      <mat-card-content>
        <p>{{ item.description }}</p>
      </mat-card-content>

    </mat-card>
  }

</div>
