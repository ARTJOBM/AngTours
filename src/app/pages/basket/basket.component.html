<p-table [value]="(basketItems$ | async) || []" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template #header>
    <tr>
      <th pSortableColumn="name" style="width:20%">Тур <p-sortIcon field="name" /></th>
      <th pSortableColumn="price" style="width:20%">Цена <p-sortIcon field="price" /> </th>
      <th pSortableColumn="date" style="width:20%">Дата <p-sortIcon field="date" /></th>
      <th style="width:15%">Удалить</th> 
      <th style="width:15%">Заказ</th>
    </tr>
  </ng-template>
  <ng-template #body let-tour>
    <tr>
      <td>{{ tour.name }}</td>
      <td>{{ tour.price }}</td>
      <td>{{ tour.date }}</td>
      <td>
      <button pButton type="button" icon="pi pi-trash" class="p-button-danger" (click)="deleteItem(tour)"></button>
      </td>
      <td>
        <button pButton type="button" icon="pi pi-check" class="p-button-success" (click)="checkout(tour)"></button>
      </td>
    </tr>
  </ng-template>
</p-table>
